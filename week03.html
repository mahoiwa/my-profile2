<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Week03 POSSE課題</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 py-8">
        <main class="max-w-4xl mx-auto px-4">
            <header class="fixed top-0 left-0 w-full bg-black-700 z-50 flex items-center justify-between px-6 py-4">
                <a href="#" class="text-2xl text-white font-bold hover:text-cyan-400 transition-colors duration-300">劇団Ambitious</a>
            </header>
            <h1 class="text-2xl font-bold text-gray-50 mt-4 mb-6 text-center">出演メンバー</h1>

            <div class="flex flex-col md:flex-row gap-6">

                <div class="bg-gray-500 shadow p-6 flex flex-col items-center w-full rounded-xl overflow-hidden">
                    <span class="text-4xl text-center mb-4">🐺</span>
                    <img src="./images.week03/Gemini_Generated_Image_69vnf269vnf269vn.png" alt="狼役の宣材写真" class="rounded-lg h-full w-full object-cover">
                    <h2 class="text-2xl font-bold text-gray-50 mt-3 text-center">オオカミ役</h2>
                    <h3 class="text-xl font-bold text-gray-100 mt-3 text-center">山城英樹</h3>
                    <p class="text-gray-50 text-sm mt-2 text-center leading-relaxed">霧が立ち込める森の奥深く。彼は人を欺き、人を脅し、人を食い物にする。会ったが最後、命はない。</p>
                </div>

                <div class="bg-gray-500 shadow p-6 flex flex-col items-center w-full rounded-xl overflow-hidden">
                    <span class="text-4xl text-center mb-4">🦊</span>
                    <img src="./images.week03/Gemini_Generated_Image_qk9rx8qk9rx8qk9r.png" alt="狐役の宣材写真" class="rounded-lg h-full w-full object-cover">
                    <h2 class="text-2xl font-bold text-gray-50 mt-3 text-center">キツネ役</h2>
                    <h3 class="text-xl font-bold text-gray-100 mt-3 text-center">栗原明菜</h3>
                    <p class="text-gray-50 text-sm mt-2 text-center leading-relaxed">美しい紅葉を小枝を踏みしめながら進んだ先。彼女は人を誘惑し、迷わせ、深淵へと誘う。出会った者は帰らない。</p>
                </div>

                <div class="bg-gray-500 shadow p-6 flex flex-col items-center w-full rounded-xl overflow-hidden">
                    <span class="text-4xl text-center mb-4">🦇</span>
                    <img src="./images.week03/Gemini_Generated_Image_3kmjkx3kmjkx3kmj.png" alt="蝙蝠役の宣材写真" class="rounded-lg h-full w-full object-cover">
                    <h2 class="text-2xl font-bold text-gray-50 mt-3 text-center">コウモリ役</h2>
                    <h3 class="text-xl font-bold text-gray-100 mt-3 text-center">関根康介</h3>
                    <p class="text-gray-50 text-sm mt-2 text-center leading-relaxed">薄暗い曇天の街で。彼は人知れず現れ、人々へ病を媒介する。出会ったものは苦しみながら息絶える。</p>
                </div>

            </div>

        </main>
    </body>
</html>
